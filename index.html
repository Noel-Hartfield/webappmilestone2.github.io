<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Book Finder</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f8;
}
nav{
    background:#2c3e50;
    padding:15px;
}
nav a{
    color:white;
    margin-right:20px;
    text-decoration:none;
    font-weight:bold;
}
.container{
    padding:20px;
}
.bookCard{
    display:inline-block;
    width:200px;
    background:white;
    margin:10px;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 5px #ccc;
    text-align:center;
}
.bookCard img{
    height:200px;
}
.hidden{display:none;}
button{
    padding:8px 15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
}
input{padding:8px;width:300px;}
select{padding:6px;}
</style>
</head>

<body>

<nav>
<a href="#" id="navHome">Home</a>
<a href="#" id="navShelf">My Bookshelf</a>
</nav>

<div class="container">

<!-- HOME SEARCH PAGE -->
<div id="homePage">
<h1>Book Search</h1>
<input type="text" id="searchBox" placeholder="Search books...">
<button id="searchBtn">Search</button>
<br><br>
Page:
<select id="pageSelect"></select>
<div id="results"></div>
</div>

<!-- BOOK DETAILS PAGE -->
<div id="detailsPage" class="hidden"></div>

<!-- BOOKSHELF PAGE -->
<div id="shelfPage" class="hidden">
<h1>My Bookshelf</h1>
<div id="bookshelfResults"></div>
</div>

</div>

<script>

let currentQuery="";
let resultsPerPage=10;
let allResults=[];

/* NAVIGATION */
$("#navHome").click(()=>showPage("home"));
$("#navShelf").click(()=>{showPage("shelf");loadBookshelf();});

function showPage(page){
    $("#homePage,#detailsPage,#shelfPage").addClass("hidden");
    if(page==="home") $("#homePage").removeClass("hidden");
    if(page==="details") $("#detailsPage").removeClass("hidden");
    if(page==="shelf") $("#shelfPage").removeClass("hidden");
}

/* SEARCH BOOKS */
$("#searchBtn").click(function(){
    currentQuery=$("#searchBox").val();
    if(currentQuery==="") return;
    let url=`https://www.googleapis.com/books/v1/volumes?q=${currentQuery}&maxResults=40`;
    $.getJSON(url,function(data){
        allResults=data.items.slice(0,60);
        buildPagination();
        displayPage(1);
    });
});

/* PAGINATION */
function buildPagination(){
    $("#pageSelect").empty();
    let pages=Math.ceil(allResults.length/resultsPerPage);
    for(let i=1;i<=pages;i++){
        $("#pageSelect").append(`<option value="${i}">${i}</option>`);
    }
}

$("#pageSelect").change(function(){
    displayPage($(this).val());
});

function displayPage(page){
    $("#results").empty();
    let start=(page-1)*resultsPerPage;
    let end=start+resultsPerPage;
    let books=allResults.slice(start,end);

    books.forEach(book=>{
        let info=book.volumeInfo;
        let img=info.imageLinks?.thumbnail || "";
        $("#results").append(`
        <div class="bookCard">
            <img src="${img}">
            <h3><a href="?book=${book.id}">${info.title}</a></h3>
        </div>`);
    });
}

/* BOOK DETAILS */
function loadDetails(id){
    let url=`https://www.googleapis.com/books/v1/volumes/${id}`;
    $.getJSON(url,function(data){
        let b=data.volumeInfo;
        let price=data.saleInfo?.listPrice?.amount || "N/A";
        $("#detailsPage").html(`
            <h1>${b.title}</h1>
            <img src="${b.imageLinks?.thumbnail}">
            <p><b>Authors:</b> ${b.authors}</p>
            <p><b>Publisher:</b> ${b.publisher}</p>
            <p><b>Price:</b> ${price}</p>
            <p>${b.description}</p>
        `);
        showPage("details");
    });
}

/* BOOKSHELF */
const bookshelfIDs=["0yfauGsKOjAC","6gfDfhmmHxMC","M6SwUjgBoy8C","kJw4xgJSEqMC","gTycDAEACAAJ"];

function loadBookshelf(){
    $("#bookshelfResults").empty();
    bookshelfIDs.forEach(id=>{
        let url=`https://www.googleapis.com/books/v1/volumes/${id}`;
        $.getJSON(url,function(data){
            let info=data.volumeInfo;
            let img=info.imageLinks?.thumbnail || "";
            $("#bookshelfResults").append(`
            <div class="bookCard">
                <img src="${img}">
                <h3><a href="?book=${id}">${info.title}</a></h3>
            </div>`);
        });
    });
}

/* CHECK URL FOR BOOK ID */
const params=new URLSearchParams(window.location.search);
if(params.get("book")){
    loadDetails(params.get("book"));
}

</script>
</body>
</html>
